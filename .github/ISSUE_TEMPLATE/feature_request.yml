name: "✨ Feature Request"
description: Propose a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea to level up the vault? Let's hear it!

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the context or frustration that motivates this request.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should PixelVault handle this?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web UI / UX
        - API / Backend
        - Mobile (Android)
        - Federation / Sharing
        - Performance
        - Documentation
        - Other
