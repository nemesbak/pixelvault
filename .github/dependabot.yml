version: 2
updates:
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    target-branch: dev
    groups:
      fastify:
        patterns: ["fastify", "@fastify/*"]
      security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    target-branch: dev

  - package-ecosystem: docker
    directory: /server
    schedule:
      interval: weekly
      day: monday
    target-branch: dev

  - package-ecosystem: docker
    directory: /web
    schedule:
      interval: weekly
      day: monday
    target-branch: dev

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    target-branch: dev
