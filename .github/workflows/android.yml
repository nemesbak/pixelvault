name: Android

on:
  push:
    branches: [main, dev]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, dev]

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixelvault-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

  release:
    name: Build & publish release APK
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Build release APK (unsigned)
        working-directory: android
        run: gradle assembleRelease --no-daemon

      - name: Sign APK
        if: ${{ secrets.SIGNING_KEY != '' }}
        uses: r0adkll/sign-android-release@v1
        id: sign
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Prepare APK for release
        id: prep
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [ -n "${{ steps.sign.outputs.signedReleaseFile }}" ]; then
            SRC="${{ steps.sign.outputs.signedReleaseFile }}"
          else
            SRC="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          fi
          DEST="pixelvault-${TAG}.apk"
          cp "$SRC" "$DEST"
          echo "apk=$DEST" >> $GITHUB_OUTPUT

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.prep.outputs.apk }}
          append_body: true
          body: |

            ---
            ### APK built by CI
            Download `pixelvault-${{ github.ref_name }}.apk` and install on Android 8.0+.

            **Primera vez** → usa **SCAN QR CODE** desde el web UI (Settings → Pair Device).
            **Re-emparejamiento** → usa **ENTER CODE** con el código de 6 dígitos.

            > Activa "Instalar fuentes desconocidas" si Android lo solicita.
