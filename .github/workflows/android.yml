name: Android

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pixelvault-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

  release:
    name: Build & publish release APK
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"

      - name: Build release APK (unsigned)
        working-directory: android
        run: gradle assembleRelease --no-daemon

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Rename signed APK
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          mv "${{ steps.sign.outputs.signedReleaseFile }}" \
             "pixelvault-${TAG}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: pixelvault-*.apk
          generate_release_notes: true
          body: |
            ## Install

            Download `pixelvault-${{ github.ref_name }}.apk` and install on Android 7.0+.

            ### First launch
            1. Enter your server URL (`http://192.168.x.x:3000`)
            2. Login or pair with a 6-digit code from the web UI

            > Enable "Install from unknown sources" in Android settings if prompted.
