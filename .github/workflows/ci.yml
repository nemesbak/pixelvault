name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint-server:
    name: Server — lint & audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      # audit-level=critical: fastify@4 has known high-severity vulns (GHSA-mrq3, GHSA-jx2c, GHSA-444r)
      # that require a breaking Fastify 5 upgrade tracked in issue #1.
      - run: npm audit --audit-level=critical

  lint-web:
    name: Web — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  docker-build:
    name: Docker — build check
    runs-on: ubuntu-latest
    needs: [lint-server, lint-web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
